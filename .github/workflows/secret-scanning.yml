# Goal - To ensure no secrets have been leaked in the code

name: Secrets Scanning


# on:
#   push:
#     branches: [ "main" ]
#   pull_request:
#     branches: [ "main" ]
#   workflow_call:

on:
    workflow_call:

jobs:
    scan-secrets:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v7
              with:
                fetch-depth: 0  

            - name: GitLeaks Scanner
              uses: gitleaks/gitleaks-action@v3
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
